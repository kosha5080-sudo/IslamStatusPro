name: Build Release APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Release APK
        uses: digreatbrian/buildozer-action@v2
        with:
          buildozer-cmd: buildozer android release

      - name: Sign APK
        run: |
          UNSIGNED_APK=$(ls bin/*release-unsigned.apk | head -n 1)

          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -n 1)

          "$BUILD_TOOLS/zipalign" -f 4 "$UNSIGNED_APK" app-aligned.apk

          keytool -genkeypair \
            -v \
            -keystore release.keystore \
            -alias islamstatus \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Islam Status,O=Islam,C=KW"

          "$BUILD_TOOLS/apksigner" sign \
            --ks release.keystore \
            --ks-key-alias islamstatus \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out bin/IslamStatusPro-release-signed.apk \
            app-aligned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: IslamStatusPro-release-signed
          path: bin/IslamStatusPro-release-signed.apk
